name: Monthly ORCID Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 1 * *"

concurrency:
  group: monthly-orcid-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install importer
        run: |
          python -m pip install --upgrade pip
          pip install .[pdf]

      - name: Validate workflow configuration
        env:
          ORCID_ID: ${{ vars.ORCID_ID }}
          PUBLICATIONS_PATH: ${{ vars.PUBLICATIONS_PATH }}
        run: |
          if [ -z "$ORCID_ID" ]; then
            echo "Repository variable ORCID_ID is required for the monthly sync." >&2
            exit 1
          fi

          OUTPUT_PATH="${PUBLICATIONS_PATH:-content/publications}"
          echo "OUTPUT_PATH=$OUTPUT_PATH" >> "$GITHUB_ENV"
          echo "Using output path: $OUTPUT_PATH"

      - name: Sync publications from ORCID
        env:
          ORCID_ID: ${{ vars.ORCID_ID }}
          ORCID_IMPORT_ARGS: ${{ vars.ORCID_IMPORT_ARGS }}
        run: |
          hugoblox-orcid-import "$ORCID_ID" --output "$OUTPUT_PATH" ${ORCID_IMPORT_ARGS:-}

      - name: Commit new publications
        env:
          TARGET_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ -z "$(git status --porcelain -- "$OUTPUT_PATH")" ]; then
            echo "No new publications to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$OUTPUT_PATH"
          git commit -m "chore: sync ORCID publications"
          git push origin "HEAD:$TARGET_BRANCH"
